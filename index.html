<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Computer Science X Compass · 학생들의 길잡이">
  <meta name="theme-color" content="#102a43">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ComPass">
  <meta property="og:title" content="ComPass">
  <meta property="og:description" content="Computer Science X Compass · 학생들의 길잡이">
  <title>ComPass · Computer Science X Compass</title>
  <link rel="icon" href="/ComPass/static/icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/ComPass/static/icons/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/ComPass/static/icons/favicon-32x32.png">
  <link rel="apple-touch-icon" href="/ComPass/static/icons/apple-touch-icon.png">
  <link rel="manifest" href="/ComPass/static/manifest.json">
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; font-family: Arial, "Noto Sans KR", sans-serif; }
    .home { position: fixed; inset: 0; background: white; }
    .utility { height: 44px; padding: 12px 30px; color: white; background: #1e315e; font-size: 13px; }
    .utility b { padding: 14px 24px; background: #2196e1; }
    .header { display: grid; grid-template-columns: minmax(320px, 1fr) auto 64px; align-items: center; height: 88px; padding-left: 28px; background: white; }
    .header img { width: min(369px, 90%); }
    .header nav { display: flex; gap: clamp(28px, 4vw, 78px); padding: 0 36px; font-size: 18px; font-weight: 750; white-space: nowrap; }
    .menu { display: grid; place-items: center; align-self: stretch; color: white; background: #234c9e; font-size: 28px; }
    .hero { position: relative; height: calc(100vh - 132px); background: url("./static/knou-home/hero.jpg") center/cover no-repeat; }
    .hero::before { position: absolute; inset: 0; content: ""; background: rgba(0,0,0,.43); }
    .copy { position: absolute; left: clamp(40px, 13.5vw, 260px); top: 29%; color: white; text-shadow: 0 2px 5px rgba(0,0,0,.55); }
    .copy h1 { margin: 0; font-size: clamp(34px, 3.2vw, 64px); font-weight: 300; }
    .copy strong { font-weight: 900; }
    .copy p { margin: 22px 0; font-size: clamp(22px, 2.2vw, 42px); font-weight: 300; }
    .green { position: absolute; inset: auto 0 0; padding: 23px; color: white; background: #24b967; text-align: center; font-size: 18px; font-weight: 750; }
    .boot { position: fixed; z-index: 5; right: 28px; bottom: 28px; width: min(390px, calc(100vw - 32px)); padding: 24px; border: 1px solid #d6e3ec; border-radius: 22px; background: rgba(255,255,255,.96); box-shadow: 0 22px 60px rgba(16,42,67,.25); text-align: center; }
    .mark { display: grid; place-items: center; width: 64px; height: 64px; margin: 0 auto 16px; animation: float 1.5s ease-in-out infinite; }
    .mark img { width: 64px; height: 64px; object-fit: contain; display: block; margin: 0 auto 16px; }
    .boot h2 { margin: 0 0 7px; color: #102a43; }
    .boot p { margin: 0; color: #66788a; font-size: 14px; line-height: 1.55; }
    .progress { position: relative; height: 7px; margin: 18px 0 12px; overflow: hidden; border-radius: 99px; background: #e4edf4; }
    .progress::after { position: absolute; inset: 0 auto 0 0; width: 38%; content: ""; border-radius: inherit; background: linear-gradient(90deg,#1769aa,#22a699); animation: progress 1.3s ease-in-out infinite; }
    .boot small { color: #1769aa; font-weight: 700; }
    #appFrame { position: fixed; z-index: 10; inset: 0; width: 100%; height: 100%; border: 0; background: white; opacity: 0; pointer-events: none; transition: opacity .25s; }
    #appFrame.ready { opacity: 1; pointer-events: auto; }
    @keyframes float { 50% { transform: translateY(-5px); } }
    @keyframes progress { from { transform: translateX(-110%); } to { transform: translateX(270%); } }
    @media (max-width:700px) {
      .utility { height: 36px; padding: 9px 12px; }
      .utility b { padding: 11px 10px; }
      .header { grid-template-columns: 1fr 54px; height: 70px; padding-left: 14px; }
      .header img { width: min(270px,92%); }
      .header nav { display:none; }
      .hero { height: calc(100vh - 106px); }
      .copy { left: 24px; right: 24px; top: 25%; }
      .copy h1 { font-size: 34px; line-height: 1.25; }
      .copy p { font-size: 21px; }
      .boot { right: 16px; bottom: 16px; padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="home" aria-hidden="true">
    <div class="utility"><b>한국방송통신대학교</b></div>
    <header class="header">
      <img src="./static/knou-home/logo-header.png" alt="">
      <nav><span>학과소개</span><span>교과정보</span><span>학습정보</span><span>학생광장</span><span>학과광장</span></nav>
      <span class="menu">☰</span>
    </header>
    <section class="hero">
      <div class="copy">
        <h1><strong>내인생</strong>을 즐거움으로 <strong>바꾼 대학</strong></h1>
        <p>한국방송통신대학교 컴퓨터과학과</p>
      </div>
      <div class="green">전화상담 안내　　→</div>
    </section>
  </div>

  <div id="boot" class="boot" role="status" aria-live="polite">
    <div class="mark"><img src="/ComPass/static/icons/icon.png" alt="" aria-hidden="true" onerror="this.style.display='none'"></div>
    <h2>ComPass를 준비하고 있습니다</h2>
    <p id="bootText">학생들의 길잡이가 공식 데이터를 확인하고 있습니다.</p>
    <div class="progress" aria-hidden="true"></div>
    <small>초기 접속은 최대 1분 정도 걸릴 수 있습니다.</small>
  </div>

  <iframe id="appFrame" title="ComPass 챗봇"></iframe>

  <script src="./static/config.js"></script>
  <script>
    const APP_CONFIG = window.COMPASS_CONFIG;
    const RENDER_URL = "https://compass-knou-cs-ai-navigator.onrender.com";
    const frame = document.getElementById("appFrame");
    const boot = document.getElementById("boot");
    const bootText = document.getElementById("bootText");
    const messages = [
      "학생들의 길잡이가 공식 데이터를 확인하고 있습니다.",
      "Computer Science × Compass",
      "컴퓨터과학과 정보를 정리하고 있습니다.",
      "ComPass가 깨어나는 중입니다."
    ];
    let messageIndex = 0;
    setInterval(() => {
      messageIndex = (messageIndex + 1) % messages.length;
      bootText.textContent = messages[messageIndex];
    }, 2200);

    async function wakeRender() {
      for (let attempt = 1; attempt <= 30; attempt += 1) {
        try {
          const response = await fetch(`${RENDER_URL}/api/health?wake=${Date.now()}`, {
            cache: "no-store",
            mode: "cors"
          });
          if (response.ok) {
            frame.addEventListener("load", () => {
              frame.classList.add("ready");
              boot.hidden = true;
            }, { once: true });
            frame.src = `${RENDER_URL}/?from=github-pages`;
            bootText.textContent = "ComPass 연결 완료. 화면을 여는 중입니다.";
            return;
          }
        } catch (_) {
          bootText.textContent = `서버를 깨우고 있습니다. (${attempt}/30)`;
        }
        await new Promise((resolve) => setTimeout(resolve, 3000));
      }
      bootText.innerHTML = `연결이 지연되고 있습니다. <a href="${RENDER_URL}" target="_blank">직접 열기</a>`;
    }
    wakeRender();
  </script>
</body>
</html>
