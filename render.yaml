services:
  - type: web
    name: knou-cs-ai-navigator
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_KNOWLEDGE_DB_ID
        value: 38773fbd195180788faac9a54ae8e512
      - key: NOTION_STATS_DB_ID
        value: 38773fbd195180708158dc38ec3fbd2f
      - key: ADMIN_PASSWORD
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: PUBLIC_LOADER_URL
        value: https://mhjang-qa.github.io/ComPass/
      - key: COMMUNITY_CRAWL_ENABLED
        value: "true"
      - key: COMMUNITY_LIST_PAGES
        value: "5"
      - key: COMMUNITY_MAX_DOCUMENTS
        value: "100"
      - key: COMMUNITY_DELAY_SECONDS
        value: "1.5"
